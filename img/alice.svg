<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 115" width="80" height="115"
     fill="none" stroke="currentColor" stroke-width="2.5"
     stroke-linecap="round" stroke-linejoin="round">
  <title>Alice</title>
  <!-- head -->
  <circle cx="40" cy="20" r="12"/>
  <!-- long hair: one continuous stroke, U-curl tips that hug the head -->
  <path d="M 24 36 C 22 45 31 45 30 38 C 29 30 26 24 28 17 C 31 12 35 8 40 7 C 45 8 49 12 52 17 C 54 24 51 30 50 38 C 49 45 58 45 56 36"/>
  <!-- eyes (filled dots) -->
  <circle cx="36" cy="18" r="1.2" fill="currentColor" stroke="none"/>
  <circle cx="44" cy="18" r="1.2" fill="currentColor" stroke="none"/>
  <!-- smile -->
  <path d="M 35 24 Q 40 28 45 24"/>
  <!-- body -->
  <line x1="40" y1="32" x2="40" y2="65"/>
  <!-- arms (single path: left hand → shoulder → right hand) -->
  <path d="M 24 50 L 40 42 L 56 50"/>
  <!-- legs -->
  <line x1="40" y1="65" x2="28" y2="92"/>
  <line x1="40" y1="65" x2="52" y2="92"/>
  <!-- name label baked into the SVG (so callers don't need a
       separate figcaption; theme color via currentColor). -->
  <text x="40" y="109" text-anchor="middle"
        font-family="sans-serif" font-size="11" font-weight="700"
        letter-spacing="0.5" fill="currentColor" stroke="none">ALICE</text>
</svg>
